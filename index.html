<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"/> <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/> <meta name="theme-color" content="#7c6dfa"/> <meta name="mobile-web-app-capable" content="yes"/> <meta name="apple-mobile-web-app-capable" content="yes"/> <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/> <meta name="apple-mobile-web-app-title" content="Chapter Tracker"/> <link rel="manifest" href="manifest.json"/> <title>Chapter Tracker</title> <style> @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap'); :root{--bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:#2a2a3a;--accent:#7c6dfa;--accent2:#3ecf8e;--text:#e8e8f0;--muted:#6b6b80;--done-bg:#0e1f17;--done-bd:#1f4d33} body.light{--bg:#f4f4f8;--surface:#ffffff;--card:#f0f0f5;--border:#dddde8;--text:#1a1a2e;--muted:#888899;--done-bg:#e8f8f1;--done-bd:#a8dfc5} *,*::before,*::after{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;min-height:100dvh;overscroll-behavior:none;transition:background .25s,color .25s;-webkit-tap-highlight-color:transparent} #onboarding{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;z-index:100;overflow-y:auto;transition:background .25s} #onboarding.hide{animation:fadeOut .3s ease forwards;pointer-events:none} @keyframes fadeOut{to{opacity:0;transform:scale(.97)}} .ob-emoji{font-size:58px;margin-bottom:14px;line-height:1} .ob-title{font-size:clamp(28px,8vw,42px);font-weight:700;letter-spacing:-1px;text-align:center;margin-bottom:6px} .ob-title span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text} .ob-sub{color:var(--muted);font-size:14px;text-align:center;margin-bottom:36px} .ob-section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;align-self:flex-start;width:100%;max-width:360px} .theme-row{display:flex;gap:12px;margin-bottom:32px;width:100%;max-width:360px} .theme-opt{flex:1;padding:12px;border-radius:14px;border:2px solid var(--border);background:var(--card);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px} .theme-opt.sel{border-color:var(--accent);color:var(--accent);background:rgba(124,109,250,.1)} .class-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:360px;margin-bottom:32px} .cls-btn{padding:14px 0;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center} .cls-btn:active{transform:scale(.93)} .cls-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff} .start-btn{width:100%;max-width:360px;padding:16px;border-radius:14px;border:none;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;cursor:pointer;opacity:.35;pointer-events:none;transition:opacity .2s,transform .1s} .start-btn.on{opacity:1;pointer-events:auto} .start-btn:active{transform:scale(.98)} #app{display:none;padding:16px 16px 90px;max-width:680px;margin:0 auto} #app.show{display:block;animation:fadeIn .3s ease} @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1}} .topbar{display:flex;align-items:center;margin-bottom:20px;gap:10px} .topbar-left{flex:1} .topbar-badge{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:2px} .topbar-title{font-size:26px;font-weight:700;letter-spacing:-.5px} .topbar-title span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text} .icon-btn{width:40px;height:40px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:border .2s;flex-shrink:0} .icon-btn:active{transform:scale(.92)} .prog-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:16px;margin-bottom:18px} .prog-info{flex:1} .prog-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px} .bar-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden} .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1);width:0%} .prog-count{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;white-space:nowrap} .prog-count span{color:var(--muted);font-size:13px} .tabs-wrap{overflow-x:auto;margin-bottom:16px;scrollbar-width:none} .tabs-wrap::-webkit-scrollbar{display:none} .tabs{display:flex;gap:8px;width:max-content;padding-bottom:2px} .tab-btn{padding:7px 16px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap} .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff} .add-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:18px} .add-row{display:flex;gap:8px;flex-wrap:wrap} .add-row input,.add-row select{flex:1;min-width:130px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;padding:11px 13px;border-radius:10px;outline:none;transition:border .2s;-webkit-appearance:none;appearance:none} .add-row input:focus,.add-row select:focus{border-color:var(--accent)} .add-row input::placeholder{color:var(--muted)} .add-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s,transform .1s} .add-btn:active{transform:scale(.95);opacity:.85} .list{display:flex;flex-direction:column;gap:10px} .ch-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:background .25s,border .25s;animation:slideIn .25s ease} @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}} .ch-card.done{background:var(--done-bg);border-color:var(--done-bd)} .tick{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s} .tick svg{display:none} .ch-card.done .tick{background:var(--accent2);border-color:var(--accent2)} .ch-card.done .tick svg{display:block} .ch-info{flex:1;min-width:0} .ch-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s} .ch-card.done .ch-name{color:var(--muted);text-decoration:line-through} .ch-meta{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:4px;display:flex;align-items:center;gap:6px} .pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;background:rgba(124,109,250,.15);color:var(--accent)} .del{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;flex-shrink:0;transition:color .2s,background .2s;font-size:17px;line-height:1} .del:active{color:#ff5555;background:rgba(255,85,85,.1)} .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;display:none} .empty.show{display:block} .empty-icon{font-size:42px;margin-bottom:10px} #installBanner{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:13px 22px;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;display:none;z-index:99;box-shadow:0 4px 24px rgba(124,109,250,.4);white-space:nowrap} #installBanner.show{display:block;animation:fadeIn .3s ease} .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px} .modal-bg.hide{display:none} .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:340px} .modal-title{font-size:18px;font-weight:700;margin-bottom:16px;text-align:center} .modal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px} .modal-cls{padding:13px 0;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center} .modal-cls.sel{background:var(--accent);border-color:var(--accent);color:#fff} .modal-actions{display:flex;gap:10px} .modal-cancel{flex:1;padding:13px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:14px;cursor:pointer} .modal-ok{flex:1;padding:13px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer} </style> </head> <body> <div id="onboarding"> <div class="ob-emoji">📚</div> <div class="ob-title">Chapter <span>Tracker</span></div> <div class="ob-sub">Class 1–12 · Track your syllabus</div> <div class="ob-section-label">Choose Theme</div> <div class="theme-row"> <button class="theme-opt sel" id="oDark" onclick="obTheme('dark')">🌙 Dark</button> <button class="theme-opt" id="oLight" onclick="obTheme('light')">☀️ Light</button> </div> <div class="ob-section-label">Select Your Class</div> <div class="class-grid" id="obGrid"></div> <button class="start-btn" id="startBtn" onclick="startApp()">Let's Go →</button> </div> <div class="modal-bg hide" id="clsModal"> <div class="modal"> <div class="modal-title">Change Class</div> <div class="modal-grid" id="modalGrid"></div> <div class="modal-actions"> <button class="modal-cancel" onclick="closeModal()">Cancel</button> <button class="modal-ok" onclick="confirmModal()">Confirm</button> </div> </div> </div> <div id="installBanner" onclick="installPWA()">📲 Add to Home Screen</div> <div id="app"> <div class="topbar"> <div class="topbar-left"> <div class="topbar-badge">📚 Academic Tracker</div> <div class="topbar-title">Class <span id="clsLabel">11th</span></div> </div> <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">☀️</button> <button class="icon-btn" onclick="openModal()">🎓</button> </div> <div class="prog-card"> <div class="prog-info"> <div class="prog-label">Overall Progress</div> <div class="bar-track"><div class="bar-fill" id="barFill"></div></div> </div> <div class="prog-count" id="progCount">0 <span>/ 0</span></div> </div> <div class="tabs-wrap"><div class="tabs" id="tabs"></div></div> <div class="add-box"> <div class="add-row"> <input id="inName" type="text" placeholder="Chapter name…" maxlength="80"/> <select id="inSub"> <option>Physics</option><option>Chemistry</option><option>Maths</option> <option>Biology</option><option>English</option><option>Hindi</option> <option>History</option><option>Geography</option><option>Economics</option> <option>CS</option><option>Sanskrit</option><option>PE</option><option>Other</option> </select> <input id="inNum" type="number" placeholder="Ch.No" min="1" max="99" style="max-width:80px"/> <button class="add-btn" onclick="addChapter()">+ Add</button> </div> </div> <div class="list" id="list"></div> <div class="empty" id="empty"> <div class="empty-icon">📖</div> No chapters yet. Add one above! </div> </div> <script> let cls=11,filter='All',obCls=null,modCls=null,deferredPrompt=null; const THEME_KEY='ct_theme',CLASS_KEY='ct_class',SETUP_KEY='ct_setup'; const savedTheme=localStorage.getItem(THEME_KEY)||'dark'; applyTheme(savedTheme); const obGrid=document.getElementById('obGrid'); for(let i=1;i<=12;i++){const b=document.createElement('button');b.className='cls-btn';b.textContent=i;b.onclick=()=>{obCls=i;obGrid.querySelectorAll('.cls-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');document.getElementById('startBtn').classList.add('on')};obGrid.appendChild(b)} document.getElementById('oDark').classList.toggle('sel',savedTheme==='dark'); document.getElementById('oLight').classList.toggle('sel',savedTheme==='light'); if(localStorage.getItem(SETUP_KEY)){cls=parseInt(localStorage.getItem(CLASS_KEY))||11;document.getElementById('onboarding').style.display='none';showApp()} function obTheme(t){applyTheme(t);localStorage.setItem(THEME_KEY,t);document.getElementById('oDark').classList.toggle('sel',t==='dark');document.getElementById('oLight').classList.toggle('sel',t==='light')} function startApp(){if(!obCls)return;cls=obCls;localStorage.setItem(CLASS_KEY,cls);localStorage.setItem(SETUP_KEY,'1');const ob=document.getElementById('onboarding');ob.classList.add('hide');setTimeout(()=>{ob.style.display='none';showApp()},300)} function showApp(){document.getElementById('app').classList.add('show');updateThemeBtn();render()} function applyTheme(t){document.body.classList.toggle('light',t==='light');localStorage.setItem(THEME_KEY,t);document.querySelector('meta[name="theme-color"]')?.setAttribute('content',t==='light'?'#f4f4f8':'#0a0a0f')} function toggleTheme(){const cur=localStorage.getItem(THEME_KEY)||'dark';applyTheme(cur==='dark'?'light':'dark');updateThemeBtn()} function updateThemeBtn(){const cur=localStorage.getItem(THEME_KEY)||'dark';document.getElementById('themeBtn').textContent=cur==='dark'?'☀️':'🌙'} function openModal(){modCls=cls;const grid=document.getElementById('modalGrid');grid.innerHTML='';for(let i=1;i<=12;i++){const b=document.createElement('button');b.className='modal-cls'+(i===cls?' sel':'');b.textContent=i;b.onclick=()=>{modCls=i;grid.querySelectorAll('.modal-cls').forEach(x=>x.classList.remove('sel'));b.classList.add('sel')};grid.appendChild(b)}document.getElementById('clsModal').classList.remove('hide')} function closeModal(){document.getElementById('clsModal').classList.add('hide')} function confirmModal(){cls=modCls;localStorage.setItem(CLASS_KEY,cls);filter='All';closeModal();render()} function key(){return'ct_ch_'+cls} function load(){return JSON.parse(localStorage.getItem(key())||'[]')} function save(d){localStorage.setItem(key(),JSON.stringify(d))} function addChapter(){const name=document.getElementById('inName').value.trim(),sub=document.getElementById('inSub').value,num=parseInt(document.getElementById('inNum').value)||0;if(!name){document.getElementById('inName').focus();return}const data=load();data.unshift({id:Date.now(),name,sub,num,done:false});save(data);document.getElementById('inName').value='';document.getElementById('inNum').value='';filter='All';render()} function toggleDone(id){const data=load(),ch=data.find(c=>c.id===id);if(ch){ch.done=!ch.done;save(data);render()}} function delChapter(id){save(load().filter(c=>c.id!==id));render()} function setFilter(f,btn){filter=f;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render()} function suffix(n){return['st','nd','rd'][n-1]||'th'} function render(){const data=load();document.getElementById('clsLabel').textContent=cls+suffix(cls);const subs=['All',...new Set(data.map(c=>c.sub))];if(!subs.includes(filter))filter='All';const tabsEl=document.getElementById('tabs');tabsEl.innerHTML='';subs.forEach(s=>{const b=document.createElement('button');b.className='tab-btn'+(s===filter?' active':'');b.textContent=s==='All'?'All ('+data.length+')':s;b.onclick=()=>setFilter(s,b);tabsEl.appendChild(b)});const vis=filter==='All'?data:data.filter(c=>c.sub===filter);const done=vis.filter(c=>c.done).length,total=vis.length,pct=total?Math.round(done/total*100):0;document.getElementById('barFill').style.width=pct+'%';document.getElementById('progCount').innerHTML=done+' <span>/ '+total+'</span>';document.getElementById('empty').classList.toggle('show',vis.length===0);const listEl=document.getElementById('list');listEl.innerHTML='';vis.forEach(ch=>{const card=document.createElement('div');card.className='ch-card'+(ch.done?' done':'');card.innerHTML='<button class="tick" onclick="toggleDone('+ch.id+')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 3" stroke="#fff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="ch-info"><div class="ch-name">'+(ch.num?'Ch '+ch.num+' — ':'')+esc(ch.name)+'</div><div class="ch-meta"><span class="pill">'+ch.sub+'</span>'+(ch.done?' ✅ Completed':'')+'</div></div><button class="del" onclick="delChapter('+ch.id+')">✕</button>';listEl.appendChild(card)})} function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')} document.getElementById('inName').addEventListener('keydown',e=>{if(e.key==='Enter')addChapter()}); window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').classList.add('show')}); function installPWA(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBanner').classList.remove('show')})} window.addEventListener('appinstalled',()=>{document.getElementById('installBanner').classList.remove('show')}); </script> <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js")}</script> </body> </html>
