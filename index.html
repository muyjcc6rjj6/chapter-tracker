<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Chapter Tracker"/>
  <title>Chapter Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
    :root{--bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:#2a2a3a;--accent:#7c6dfa;--accent2:#3ecf8e;--text:#e8e8f0;--muted:#6b6b80;--done-bg:#0e1f17;--done-bd:#1f4d33}
    body.light{--bg:#f4f4f8;--surface:#ffffff;--card:#f0f0f5;--border:#dddde8;--text:#1a1a2e;--muted:#888899;--done-bg:#e8f8f1;--done-bd:#a8dfc5}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;min-height:100dvh;overscroll-behavior:none;transition:background .25s,color .25s;-webkit-tap-highlight-color:transparent}
    #onboarding{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;z-index:100;overflow-y:auto;transition:background .25s}
    #onboarding.hide{animation:fadeOut .3s ease forwards;pointer-events:none}
    @keyframes fadeOut{to{opacity:0;transform:scale(.97)}}
    .ob-title{font-size:clamp(28px,8vw,42px);font-weight:700;letter-spacing:-1px;text-align:center;margin-bottom:6px}
    .ob-title span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .ob-sub{color:var(--muted);font-size:14px;text-align:center;margin-bottom:36px}
    .ob-section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;align-self:flex-start;width:100%;max-width:360px}
    .theme-row{display:flex;gap:12px;margin-bottom:32px;width:100%;max-width:360px}
    .theme-opt{flex:1;padding:12px;border-radius:14px;border:2px solid var(--border);background:var(--card);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .theme-opt.sel{border-color:var(--accent);color:var(--accent);background:rgba(124,109,250,.1)}
    .class-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:360px;margin-bottom:32px}
    .cls-btn{padding:14px 0;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
    .cls-btn:active{transform:scale(.93)}
    .cls-btn.sel{background:var(--accent);border-color:var(--accent);color:#fff}
    .start-btn{width:100%;max-width:360px;padding:16px;border-radius:14px;border:none;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;cursor:pointer;opacity:.35;pointer-events:none;transition:opacity .2s,transform .1s}
    .start-btn.on{opacity:1;pointer-events:auto}
    .start-btn:active{transform:scale(.98)}
    #app{display:none;padding:16px 16px 90px;max-width:680px;margin:0 auto}
    #app.show{display:block;animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
    .topbar{display:flex;align-items:center;margin-bottom:20px;gap:10px}
    .topbar-left{flex:1}
    .topbar-badge{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:2px;display:flex;align-items:center;gap:5px}
    .topbar-title{font-size:26px;font-weight:700;letter-spacing:-.5px}
    .topbar-title span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .icon-btn{width:40px;height:40px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:border .2s;flex-shrink:0}
    .icon-btn:active{transform:scale(.92)}
    .streak-badge{display:flex;align-items:center;gap:5px;background:rgba(255,165,0,.12);border:1px solid rgba(255,165,0,.25);border-radius:10px;padding:6px 12px;color:#ffaa00;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;flex-shrink:0}
    .prog-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:14px}
    .prog-top{display:flex;align-items:center;gap:16px;margin-bottom:12px}
    .prog-info{flex:1}
    .prog-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .bar-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
    .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1);width:0%}
    .prog-count{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;white-space:nowrap}
    .prog-count span{color:var(--muted);font-size:13px}
    .stats-row{display:flex;gap:10px;margin-bottom:12px}
    .stat-box{flex:1;background:var(--card);border-radius:10px;padding:8px 12px;text-align:center}
    .stat-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700}
    .stat-lbl{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px}
    .prog-quote{font-size:12px;color:var(--muted);font-style:italic;text-align:center;padding:8px 0 0;border-top:1px solid var(--border)}
    .tabs-area{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .tabs-wrap{overflow-x:auto;flex:1;scrollbar-width:none}
    .tabs-wrap::-webkit-scrollbar{display:none}
    .tabs{display:flex;gap:8px;width:max-content;padding-bottom:2px}
    .tab-btn{padding:7px 16px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
    .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .pending-btn{padding:7px 14px;border-radius:99px;flex-shrink:0;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
    .pending-btn.on{border-color:#ff7a5c;background:rgba(255,122,92,.12);color:#ff7a5c}
    .add-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:18px}
    .add-row{display:flex;gap:8px;flex-wrap:wrap}
    .add-row input,.add-row select{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;padding:11px 13px;border-radius:10px;outline:none;transition:border .2s;-webkit-appearance:none;appearance:none}
    .add-row input:focus,.add-row select:focus{border-color:var(--accent)}
    .add-row input::placeholder{color:var(--muted)}
    .add-row input[type=number]{max-width:80px;min-width:70px}
    .add-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s,transform .1s}
    .add-btn:active{transform:scale(.95);opacity:.85}
    .list{display:flex;flex-direction:column;gap:10px}
    .ch-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:background .25s,border .25s;animation:slideIn .25s ease}
    @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .ch-card.done{background:var(--done-bg);border-color:var(--done-bd)}
    .ch-card.starred:not(.done){background:rgba(124,109,250,.06);border-color:rgba(124,109,250,.35)}
    .tick{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
    .tick svg{display:none}
    .ch-card.done .tick{background:var(--accent2);border-color:var(--accent2)}
    .ch-card.done .tick svg{display:block}
    .ch-info{flex:1;min-width:0}
    .ch-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
    .ch-card.done .ch-name{color:var(--muted);text-decoration:line-through}
    .ch-meta{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;background:rgba(124,109,250,.15);color:var(--accent)}
    .star-btn{background:none;border:none;color:var(--border);cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0;font-size:20px;line-height:1;transition:color .2s}
    .star-btn.on{color:#ffaa00}
    .del{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;flex-shrink:0;transition:color .2s,background .2s;font-size:17px;line-height:1}
    .del:active{color:#ff5555;background:rgba(255,85,85,.1)}
    .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;display:none}
    .empty.show{display:block}
    .empty-icon{font-size:42px;margin-bottom:10px}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
    .modal-bg.hide{display:none}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:340px}
    .modal-title{font-size:18px;font-weight:700;margin-bottom:16px;text-align:center}
    .modal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
    .modal-cls{padding:13px 0;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15px;text-align:center}
    .modal-cls.sel{background:var(--accent);border-color:var(--accent);color:#fff}
    .modal-actions{display:flex;gap:10px}
    .modal-cancel{flex:1;padding:13px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:14px;cursor:pointer}
    .modal-ok{flex:1;padding:13px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>

<div id="onboarding">
  <svg width="72" height="72" viewBox="0 0 56 56" fill="none" style="margin-bottom:16px" xmlns="http://www.w3.org/2000/svg">
    <rect width="56" height="56" rx="14" fill="#16161f"/>
    <rect x="9" y="10" width="24" height="32" rx="3" fill="#2a2a3a"/>
    <rect x="11" y="12" width="20" height="28" rx="2" fill="#1e1e2e"/>
    <rect x="14" y="17" width="14" height="2" rx="1" fill="#7c6dfa" opacity="0.8"/>
    <rect x="14" y="22" width="10" height="2" rx="1" fill="#7c6dfa" opacity="0.5"/>
    <rect x="14" y="27" width="12" height="2" rx="1" fill="#7c6dfa" opacity="0.5"/>
    <rect x="9" y="38" width="24" height="3" rx="1.5" fill="#3a3a50"/>
    <rect x="23" y="10" width="24" height="32" rx="3" fill="#222230"/>
    <rect x="25" y="12" width="20" height="28" rx="2" fill="#1a1a28"/>
    <rect x="28" y="17" width="14" height="2" rx="1" fill="#3ecf8e" opacity="0.8"/>
    <rect x="28" y="22" width="10" height="2" rx="1" fill="#3ecf8e" opacity="0.5"/>
    <rect x="28" y="27" width="12" height="2" rx="1" fill="#3ecf8e" opacity="0.5"/>
    <rect x="23" y="38" width="24" height="3" rx="1.5" fill="#303045"/>
    <rect x="9" y="40" width="38" height="3" rx="1.5" fill="#2a2a3a"/>
  </svg>
  <div class="ob-title">Chapter <span>Tracker</span></div>
  <div class="ob-sub">Class 1–12 · Track your syllabus</div>
  <div class="ob-section-label">Choose Theme</div>
  <div class="theme-row">
    <button class="theme-opt sel" id="oDark" onclick="obTheme('dark')">🌙 Dark</button>
    <button class="theme-opt" id="oLight" onclick="obTheme('light')">☀️ Light</button>
  </div>
  <div class="ob-section-label">Select Your Class</div>
  <div class="class-grid" id="obGrid"></div>
  <button class="start-btn" id="startBtn" onclick="startApp()">Let's Go →</button>
</div>

<div class="modal-bg hide" id="clsModal">
  <div class="modal">
    <div class="modal-title">Change Class</div>
    <div class="modal-grid" id="modalGrid"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-ok" onclick="confirmModal()">Confirm</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-badge">
        <svg width="16" height="16" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="56" height="56" rx="14" fill="#16161f"/>
          <rect x="9" y="10" width="24" height="32" rx="3" fill="#2a2a3a"/>
          <rect x="11" y="12" width="20" height="28" rx="2" fill="#1e1e2e"/>
          <rect x="14" y="17" width="14" height="2" rx="1" fill="#7c6dfa" opacity="0.9"/>
          <rect x="14" y="22" width="10" height="2" rx="1" fill="#7c6dfa" opacity="0.6"/>
          <rect x="23" y="10" width="24" height="32" rx="3" fill="#222230"/>
          <rect x="25" y="12" width="20" height="28" rx="2" fill="#1a1a28"/>
          <rect x="28" y="17" width="14" height="2" rx="1" fill="#3ecf8e" opacity="0.9"/>
          <rect x="28" y="22" width="10" height="2" rx="1" fill="#3ecf8e" opacity="0.6"/>
          <rect x="9" y="40" width="38" height="3" rx="1.5" fill="#2a2a3a"/>
        </svg>
        Academic Tracker
      </div>
      <div class="topbar-title">Class <span id="clsLabel">11th</span></div>
    </div>
    <div class="streak-badge" id="streakBadge" style="display:none">🔥 <span id="streakNum">0</span></div>
    <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
    <button class="icon-btn" onclick="openModal()">🎓</button>
  </div>

  <div class="prog-card">
    <div class="prog-top">
      <div class="prog-info">
        <div class="prog-label">Overall Progress</div>
        <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      </div>
      <div class="prog-count" id="progCount">0 <span>/ 0</span></div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="statDone" style="color:#3ecf8e">0</div><div class="stat-lbl">Done</div></div>
      <div class="stat-box"><div class="stat-val" id="statLeft" style="color:#ff7a5c">0</div><div class="stat-lbl">Left</div></div>
      <div class="stat-box"><div class="stat-val" id="statPct" style="color:#7c6dfa">0%</div><div class="stat-lbl">Done</div></div>
      <div class="stat-box"><div class="stat-val" id="statStreak" style="color:#ffaa00">—</div><div class="stat-lbl">Streak</div></div>
    </div>
    <div class="prog-quote" id="progQuote"></div>
  </div>

  <div class="tabs-area">
    <div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
    <button class="pending-btn" id="pendingBtn" onclick="togglePending()">⏳ Pending</button>
  </div>

  <div class="add-box">
    <div class="add-row">
      <input id="inName" type="text" placeholder="Chapter name…" maxlength="80"/>
      <select id="inSub">
        <option>Physics</option><option>Chemistry</option><option>Maths</option>
        <option>Biology</option><option>English</option><option>Hindi</option>
        <option>History</option><option>Geography</option><option>Economics</option>
        <option>CS</option><option>Sanskrit</option><option>PE</option><option>Other</option>
      </select>
      <input id="inNum" type="number" placeholder="Ch.No" min="1" max="99"/>
      <button class="add-btn" onclick="addChapter()">+ Add</button>
    </div>
  </div>

  <div class="list" id="list"></div>
  <div class="empty" id="empty">
    <div class="empty-icon">📖</div>
    <span id="emptyMsg">No chapters yet. Add one above!</span>
  </div>
</div>

<script>
  const QUOTES = [
    "Small steps every day lead to big results.",
    "Your future self will thank you.",
    "One chapter closer to your goal.",
    "Consistency beats perfection.",
    "Study hard, shine bright.",
    "Every expert was once a beginner.",
    "Focus on progress, not perfection.",
    "The secret of getting ahead is getting started."
  ];
  document.getElementById('progQuote').textContent = '"' + QUOTES[Math.floor(Math.random()*QUOTES.length)] + '"';

  let cls=11, filter='All', pendingOnly=false, obCls=null, modCls=null;
  const THEME_KEY='ct_theme', CLASS_KEY='ct_class', SETUP_KEY='ct_setup';
  const STREAK_KEY='ct_streak', STREAK_DATE_KEY='ct_streak_date';

  const savedTheme = localStorage.getItem(THEME_KEY)||'dark';
  applyTheme(savedTheme);

  const obGrid = document.getElementById('obGrid');
  for(let i=1;i<=12;i++){
    const b=document.createElement('button');
    b.className='cls-btn'; b.textContent=i;
    b.onclick=()=>{obCls=i;obGrid.querySelectorAll('.cls-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');document.getElementById('startBtn').classList.add('on')};
    obGrid.appendChild(b);
  }
  document.getElementById('oDark').classList.toggle('sel',savedTheme==='dark');
  document.getElementById('oLight').classList.toggle('sel',savedTheme==='light');

  if(localStorage.getItem(SETUP_KEY)){
    cls=parseInt(localStorage.getItem(CLASS_KEY))||11;
    document.getElementById('onboarding').style.display='none';
    showApp();
  }

  function obTheme(t){applyTheme(t);document.getElementById('oDark').classList.toggle('sel',t==='dark');document.getElementById('oLight').classList.toggle('sel',t==='light')}
  function startApp(){if(!obCls)return;cls=obCls;localStorage.setItem(CLASS_KEY,cls);localStorage.setItem(SETUP_KEY,'1');const ob=document.getElementById('onboarding');ob.classList.add('hide');setTimeout(()=>{ob.style.display='none';showApp()},300)}
  function showApp(){document.getElementById('app').classList.add('show');updateThemeBtn();render()}
  function applyTheme(t){document.body.classList.toggle('light',t==='light');localStorage.setItem(THEME_KEY,t);document.querySelector('meta[name="theme-color"]')?.setAttribute('content',t==='light'?'#f4f4f8':'#0a0a0f')}
  function toggleTheme(){const cur=localStorage.getItem(THEME_KEY)||'dark';applyTheme(cur==='dark'?'light':'dark');updateThemeBtn()}
  function updateThemeBtn(){const cur=localStorage.getItem(THEME_KEY)||'dark';document.getElementById('themeBtn').textContent=cur==='dark'?'☀️':'🌙'}

  function openModal(){modCls=cls;const grid=document.getElementById('modalGrid');grid.innerHTML='';for(let i=1;i<=12;i++){const b=document.createElement('button');b.className='modal-cls'+(i===cls?' sel':'');b.textContent=i;b.onclick=()=>{modCls=i;grid.querySelectorAll('.modal-cls').forEach(x=>x.classList.remove('sel'));b.classList.add('sel')};grid.appendChild(b)}document.getElementById('clsModal').classList.remove('hide')}
  function closeModal(){document.getElementById('cls
